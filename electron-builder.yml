appId: com.evanhoddinott.claudeforge
productName: Claude Forge
copyright: Copyright © 2026 Evan Hoddinott
artifactName: Claude-Forge-${version}-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: assets

# Override main entry to point to production Vite output
extraMetadata:
  main: dist/build/main.js

files:
  - dist/**/*
  - "!dist/**/*.map"
  - "!node_modules/**/test/**"
  - "!node_modules/**/docs/**"
  - "!node_modules/**/*.md"
  - "!src/**/*"

extraResources:
  - from: assets/icons/icon.png
    to: icon.png

asar: true

# ── Windows ──────────────────────────────────────────────────
win:
  icon: assets/icons/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Claude Forge
  runAfterFinish: true
  installerIcon: assets/icons/icon.ico
  uninstallerIcon: assets/icons/icon.ico
  uninstallDisplayName: Claude Forge
  artifactName: Claude-Forge-Setup-${version}.${ext}

# ── Linux ────────────────────────────────────────────────────
linux:
  icon: assets/icons
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  desktop:
    entry:
      Name: Claude Forge
      Comment: AI-powered project manager for Claude Code, Gemini CLI, and OpenAI Codex
      Categories: Development;IDE;

deb:
  depends:
    - libnotify4
    - libxtst6
    - libnss3
    - git
  packageCategory: devel
  priority: optional
  artifactName: claude-forge_${version}_${arch}.${ext}

appImage:
  artifactName: Claude-Forge-${version}.${ext}

# ── macOS ────────────────────────────────────────────────────
# Note: .dmg can only be built on macOS. From Linux/WSL, build .zip instead.
mac:
  icon: assets/icons/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64

dmg:
  contents:
    - x: 130
      "y": 220
    - x: 410
      "y": 220
      type: link
      path: /Applications
  artifactName: Claude-Forge-${version}-mac-${arch}.dmg

# ── Auto-update ─────────────────────────────────────────────
publish:
  provider: github
  owner: evan-hoddinott
  repo: claude-forge
  releaseType: release
