<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!-- Background -->
  <rect width="1024" height="1024" rx="228" fill="#0a0a0f"/>

  <!-- Subtle circuit-board pattern -->
  <g stroke="#38bdf8" stroke-width="1.5" opacity="0.08">
    <!-- Horizontal traces -->
    <line x1="120" y1="200" x2="400" y2="200"/>
    <line x1="624" y1="200" x2="904" y2="200"/>
    <line x1="120" y1="824" x2="340" y2="824"/>
    <line x1="684" y1="824" x2="904" y2="824"/>
    <!-- Vertical traces -->
    <line x1="200" y1="120" x2="200" y2="300"/>
    <line x1="824" y1="120" x2="824" y2="300"/>
    <line x1="200" y1="724" x2="200" y2="904"/>
    <line x1="824" y1="724" x2="824" y2="904"/>
    <!-- Diagonal connectors -->
    <line x1="300" y1="200" x2="360" y2="260"/>
    <line x1="724" y1="200" x2="664" y2="260"/>
    <line x1="300" y1="824" x2="360" y2="764"/>
    <line x1="724" y1="824" x2="664" y2="764"/>
    <!-- Circuit nodes -->
    <circle cx="200" cy="200" r="6" fill="#38bdf8"/>
    <circle cx="824" cy="200" r="6" fill="#38bdf8"/>
    <circle cx="200" cy="824" r="6" fill="#38bdf8"/>
    <circle cx="824" cy="824" r="6" fill="#38bdf8"/>
    <circle cx="400" cy="200" r="4" fill="#38bdf8"/>
    <circle cx="624" cy="200" r="4" fill="#38bdf8"/>
    <circle cx="340" cy="824" r="4" fill="#38bdf8"/>
    <circle cx="684" cy="824" r="4" fill="#38bdf8"/>
  </g>

  <!-- More circuit traces closer to center -->
  <g stroke="#38bdf8" stroke-width="1" opacity="0.05">
    <line x1="320" y1="360" x2="320" y2="440"/>
    <line x1="704" y1="360" x2="704" y2="440"/>
    <line x1="280" y1="660" x2="360" y2="660"/>
    <line x1="664" y1="660" x2="744" y2="660"/>
    <circle cx="320" cy="360" r="3" fill="#38bdf8"/>
    <circle cx="704" cy="360" r="3" fill="#38bdf8"/>
    <circle cx="280" cy="660" r="3" fill="#38bdf8"/>
    <circle cx="744" cy="660" r="3" fill="#38bdf8"/>
  </g>

  <!-- Glow effect behind anvil -->
  <ellipse cx="512" cy="540" rx="260" ry="200" fill="#38bdf8" opacity="0.04"/>

  <!-- Anvil body -->
  <g transform="translate(512, 490)">
    <!-- Anvil base (wide bottom) -->
    <rect x="-180" y="100" width="360" height="60" rx="12" fill="#1c1c27" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.3"/>

    <!-- Anvil foot/pedestal -->
    <path d="M-120 100 L-100 40 L100 40 L120 100 Z" fill="#1c1c27" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.25"/>

    <!-- Anvil face (main working surface) -->
    <rect x="-160" y="-20" width="320" height="60" rx="8" fill="#1c1c27" stroke="#38bdf8" stroke-width="2.5" stroke-opacity="0.4"/>

    <!-- Anvil horn (left protrusion) -->
    <path d="M-160 -10 Q-220 0 -240 15 Q-220 30 -160 40" fill="#1c1c27" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.35"/>

    <!-- Anvil heel (right step) -->
    <rect x="120" y="-40" width="60" height="80" rx="6" fill="#1c1c27" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.3"/>

    <!-- Surface highlights -->
    <line x1="-130" y1="10" x2="100" y2="10" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.15"/>
    <line x1="-130" y1="22" x2="100" y2="22" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.08"/>

    <!-- Circuit traces on anvil face -->
    <circle cx="-80" cy="10" r="3" fill="#38bdf8" opacity="0.3"/>
    <circle cx="0" cy="10" r="3" fill="#38bdf8" opacity="0.3"/>
    <circle cx="80" cy="10" r="3" fill="#38bdf8" opacity="0.3"/>
    <line x1="-77" y1="10" x2="-3" y2="10" stroke="#38bdf8" stroke-width="1" opacity="0.2"/>
    <line x1="3" y1="10" x2="77" y2="10" stroke="#38bdf8" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Spark effects above anvil -->
  <g fill="#38bdf8">
    <circle cx="470" cy="380" r="4" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="530" cy="360" r="3" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="556" cy="390" r="2.5" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.2s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="490" cy="350" r="2" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.05;0.3" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>

  <!-- "CF" monogram watermark (very subtle) -->
  <text x="512" y="740" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="48" fill="#38bdf8" opacity="0.12" letter-spacing="8">CLAUDE FORGE</text>
</svg>
